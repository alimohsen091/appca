workflows:
  android-debug-apk:
    name: Build Cashier Printer Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Check project files
        script: |
          pwd
          ls -la
          test -f settings.gradle
          test -f build.gradle
          test -d app
      - name: Create Gradle wrapper if missing
        script: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
